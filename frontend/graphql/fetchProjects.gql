query fetchProjects($category: String!) {
  projects(
    filters: { Category: { eq: $category } }
    sort: "publishedAt:DESC"
    pagination: { limit: 30 }
  ) {
    data {
      id
      attributes {
        title
        Category
        subtitle
        description
        external_url
        highlight
        order
        cover {
          data {
            id
            attributes {
              url
            }
          }
        }
      }
    }
  }
}
